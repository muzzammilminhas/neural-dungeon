<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Dungeon</title>
<style>
  :root {
    --cyan: #45f7ff;
    --pink: #ff3fb4;
    --lime: #9cff4d;
    --amber: #ffd34d;
    --red: #ff4b6e;
    --glass: rgba(4, 10, 20, 0.68);
    --line: rgba(80, 247, 255, 0.28);
    --text: #eaffff;
  }

  * {
    box-sizing: border-box;
    user-select: none;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: #02040a;
    color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  #gameCanvas {
    display: block;
    width: 100vw;
    height: 100vh;
    background: radial-gradient(circle at 50% 50%, #07111d 0%, #02040a 58%, #000 100%);
    cursor: crosshair;
  }

  #hud {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 3;
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: min(360px, calc(100vw - 32px));
    pointer-events: none;
  }

  .panel {
    border: 1px solid var(--line);
    background: linear-gradient(135deg, rgba(8, 20, 38, 0.84), rgba(4, 9, 18, 0.58));
    box-shadow: 0 0 24px rgba(69, 247, 255, 0.12), inset 0 0 18px rgba(69, 247, 255, 0.06);
    border-radius: 8px;
  }

  #hpPanel {
    padding: 12px;
  }

  #hpMeta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-size: 12px;
    color: rgba(234, 255, 255, 0.86);
  }

  #hpShell {
    height: 18px;
    width: 100%;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid rgba(255, 75, 110, 0.58);
    background: rgba(35, 5, 18, 0.88);
    box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.55), 0 0 16px rgba(255, 75, 110, 0.14);
  }

  #hpFill {
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, #ff2b63, #ff7a4d, #ffe85c);
    box-shadow: 0 0 18px rgba(255, 75, 110, 0.55);
    transition: width 120ms linear;
  }

  #stats {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
    padding: 10px;
  }

  .stat {
    min-width: 0;
    border-radius: 6px;
    border: 1px solid rgba(69, 247, 255, 0.18);
    background: rgba(2, 7, 14, 0.58);
    padding: 8px 9px;
  }

  .stat span {
    display: block;
    color: rgba(234, 255, 255, 0.58);
    font-size: 10px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-bottom: 3px;
    white-space: nowrap;
  }

  .stat strong {
    display: block;
    font-size: 17px;
    line-height: 1.1;
    color: #fff;
    text-shadow: 0 0 10px rgba(69, 247, 255, 0.5);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #activeItems {
    display: flex;
    gap: 8px;
    min-height: 44px;
    align-items: center;
    padding: 8px;
  }

  .itemBadge {
    width: 38px;
    height: 38px;
    display: grid;
    place-items: center;
    border-radius: 7px;
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 0.02em;
    border: 1px solid currentColor;
    background: rgba(2, 6, 12, 0.72);
    text-shadow: 0 0 8px currentColor;
    box-shadow: 0 0 18px currentColor, inset 0 0 10px rgba(255, 255, 255, 0.06);
  }

  .itemBadge.speed { color: var(--cyan); }
  .itemBadge.damage { color: var(--amber); }
  .itemBadge.health { color: var(--red); }

  #legend {
    position: fixed;
    right: 16px;
    bottom: 16px;
    z-index: 3;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: flex-end;
    max-width: min(560px, calc(100vw - 32px));
    padding: 10px;
    pointer-events: none;
    color: rgba(234, 255, 255, 0.86);
  }

  .key {
    min-width: 34px;
    height: 28px;
    display: inline-grid;
    place-items: center;
    padding: 0 9px;
    border-radius: 5px;
    border: 1px solid rgba(69, 247, 255, 0.35);
    background: rgba(3, 12, 23, 0.78);
    color: #fff;
    font-weight: 800;
    font-size: 12px;
    box-shadow: inset 0 0 12px rgba(69, 247, 255, 0.05), 0 0 10px rgba(69, 247, 255, 0.1);
  }

  #overlay {
    position: fixed;
    inset: 0;
    z-index: 6;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: radial-gradient(circle at center, rgba(8, 22, 42, 0.72), rgba(0, 0, 0, 0.92));
  }

  #overlay.show {
    display: flex;
  }

  #overlayCard {
    width: min(460px, 100%);
    padding: 28px;
    border-radius: 8px;
    border: 1px solid rgba(69, 247, 255, 0.34);
    background: linear-gradient(135deg, rgba(7, 18, 32, 0.94), rgba(4, 7, 14, 0.94));
    box-shadow: 0 0 46px rgba(69, 247, 255, 0.18), inset 0 0 22px rgba(255, 63, 180, 0.06);
    text-align: center;
  }

  #overlayTitle {
    margin: 0 0 10px;
    font-size: clamp(32px, 8vw, 54px);
    line-height: 0.95;
    letter-spacing: 0.02em;
    color: #fff;
    text-shadow: 0 0 18px rgba(69, 247, 255, 0.7), 0 0 30px rgba(255, 63, 180, 0.34);
  }

  #overlayMessage {
    margin: 0 0 20px;
    color: rgba(234, 255, 255, 0.78);
    font-size: 16px;
  }

  #regenButton {
    border: 1px solid rgba(69, 247, 255, 0.72);
    border-radius: 6px;
    padding: 12px 18px;
    color: #021018;
    background: linear-gradient(90deg, #45f7ff, #9cff4d);
    font-weight: 900;
    letter-spacing: 0.02em;
    cursor: pointer;
    box-shadow: 0 0 22px rgba(69, 247, 255, 0.38);
  }

  #regenButton:focus-visible {
    outline: 2px solid #fff;
    outline-offset: 4px;
  }

  @media (max-width: 720px) {
    #hud {
      width: calc(100vw - 24px);
      top: 12px;
      left: 12px;
    }

    #legend {
      left: 12px;
      right: 12px;
      bottom: 12px;
      justify-content: center;
    }

    #stats {
      grid-template-columns: repeat(3, 1fr);
    }
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="hud">
  <div id="hpPanel" class="panel">
    <div id="hpMeta"><span>Neural Integrity</span><strong id="hpText">100 / 100</strong></div>
    <div id="hpShell"><div id="hpFill"></div></div>
  </div>
  <div id="stats" class="panel">
    <div class="stat"><span>Score</span><strong id="scoreText">0</strong></div>
    <div class="stat"><span>Kills</span><strong id="killsText">0</strong></div>
    <div class="stat"><span>Room x</span><strong id="multText">1</strong></div>
  </div>
  <div id="activeItems" class="panel"></div>
</div>
<div id="legend" class="panel">
  <span class="key">W</span>
  <span class="key">A</span>
  <span class="key">S</span>
  <span class="key">D</span>
  <span class="key">Space</span>
  <span class="key">Dodge</span>
  <span class="key">Click</span>
  <span class="key">Attack</span>
</div>
<div id="overlay">
  <div id="overlayCard">
    <h1 id="overlayTitle">Neural Dungeon</h1>
    <p id="overlayMessage">Final score: 0</p>
    <button id="regenButton">Regenerate Dungeon</button>
  </div>
</div>
<script>
(() => {
  "use strict";

  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const hpFill = document.getElementById("hpFill");
  const hpText = document.getElementById("hpText");
  const scoreText = document.getElementById("scoreText");
  const killsText = document.getElementById("killsText");
  const multText = document.getElementById("multText");
  const activeItemsEl = document.getElementById("activeItems");
  const overlay = document.getElementById("overlay");
  const overlayTitle = document.getElementById("overlayTitle");
  const overlayMessage = document.getElementById("overlayMessage");
  const regenButton = document.getElementById("regenButton");

  const TILE = 32;
  const MAP_W = 78;
  const MAP_H = 50;
  const WALL = 1;
  const FLOOR = 0;
  const DIRS = [[1, 0], [-1, 0], [0, 1], [0, -1]];
  const SENTINEL_HALF_CONE = Math.PI / 8;
  const ENEMY_DATA = {
    grunt: { hp: 42, speed: 94, aggro: 12, color: "#ff3fb4", damage: 13 },
    archer: { hp: 32, speed: 82, aggro: 13, color: "#45f7ff", damage: 9 },
    sentinel: { hp: 58, speed: 76, aggro: 11, color: "#ffd34d", damage: 15 }
  };
  const ITEM_DATA = {
    health: { label: "HP", color: "#ff4b6e" },
    speed: { label: "SPD", color: "#45f7ff" },
    damage: { label: "DMG", color: "#ffd34d" }
  };

  let dpr = 1;
  let viewW = 0;
  let viewH = 0;
  let rng;
  let grid;
  let rooms;
  let explored;
  let startRoom;
  let currentRoom;
  let lastRoom;
  let exitTile;
  let enemies;
  let items;
  let projectiles;
  let particles;
  let player;
  let camera;
  let keys;
  let mouse;
  let gameState;
  let screenShake;
  let enemyId;
  let lastHud = "";
  let lastTime = performance.now();
  let backdropCanvas;
  let vignetteCanvas;
  let dungeonCanvas;
  let minimapCanvas;
  let minimapDirty = true;
  let lastRevealX = -1;
  let lastRevealY = -1;
  let fpsValue = 60;
  let fpsFrames = 0;
  let fpsTimer = performance.now();
  const MINIMAP_TILE = 3;

  class RNG {
    constructor(seed) {
      this.seed = seed >>> 0 || 1;
    }

    next() {
      let t = this.seed += 0x6D2B79F5;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }

    int(min, max) {
      return Math.floor(this.next() * (max - min + 1)) + min;
    }

    float(min, max) {
      return this.next() * (max - min) + min;
    }

    pick(list) {
      return list[Math.floor(this.next() * list.length)];
    }
  }

  class MinHeap {
    constructor() {
      this.items = [];
    }

    push(node) {
      this.items.push(node);
      this.bubble(this.items.length - 1);
    }

    pop() {
      const top = this.items[0];
      const end = this.items.pop();
      if (this.items.length) {
        this.items[0] = end;
        this.sink(0);
      }
      return top;
    }

    get length() {
      return this.items.length;
    }

    bubble(index) {
      while (index > 0) {
        const parent = (index - 1) >> 1;
        if (this.items[parent].f <= this.items[index].f) break;
        [this.items[parent], this.items[index]] = [this.items[index], this.items[parent]];
        index = parent;
      }
    }

    sink(index) {
      const length = this.items.length;
      while (true) {
        const left = index * 2 + 1;
        const right = left + 1;
        let smallest = index;
        if (left < length && this.items[left].f < this.items[smallest].f) smallest = left;
        if (right < length && this.items[right].f < this.items[smallest].f) smallest = right;
        if (smallest === index) break;
        [this.items[smallest], this.items[index]] = [this.items[index], this.items[smallest]];
        index = smallest;
      }
    }
  }

  const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
  const length = (x, y) => Math.hypot(x, y);
  const distance = (ax, ay, bx, by) => Math.hypot(ax - bx, ay - by);
  const tileX = x => Math.floor(x / TILE);
  const tileY = y => Math.floor(y / TILE);
  const tileCenterX = x => x * TILE + TILE / 2;
  const tileCenterY = y => y * TILE + TILE / 2;
  const angleDiff = (a, b) => Math.atan2(Math.sin(a - b), Math.cos(a - b));

  function makeSeed() {
    const values = new Uint32Array(1);
    if (window.crypto && crypto.getRandomValues) crypto.getRandomValues(values);
    return (values[0] ^ Date.now() ^ Math.floor(Math.random() * 0xffffffff)) >>> 0;
  }

  function renderBackdropCache() {
    backdropCanvas = document.createElement("canvas");
    const w = Math.max(1, Math.floor(viewW * dpr));
    const h = Math.max(1, Math.floor(viewH * dpr));
    backdropCanvas.width = w;
    backdropCanvas.height = h;
    const c = backdropCanvas.getContext("2d");
    const gradient = c.createRadialGradient(w * 0.5, h * 0.5, 30 * dpr, w * 0.5, h * 0.5, Math.max(w, h) * 0.7);
    gradient.addColorStop(0, "#07101c");
    gradient.addColorStop(0.58, "#02050d");
    gradient.addColorStop(1, "#000000");
    c.fillStyle = gradient;
    c.fillRect(0, 0, w, h);
    c.save();
    c.globalAlpha = 0.10;
    c.strokeStyle = "#12304a";
    c.lineWidth = 1;
    for (let x = -h * 0.2; x < w; x += 68 * dpr) {
      c.beginPath();
      c.moveTo(x, 0);
      c.lineTo(x + h * 0.2, h);
      c.stroke();
    }
    c.restore();
  }

  function renderVignetteCache() {
    vignetteCanvas = document.createElement("canvas");
    const w = Math.max(1, Math.floor(viewW * dpr));
    const h = Math.max(1, Math.floor(viewH * dpr));
    vignetteCanvas.width = w;
    vignetteCanvas.height = h;
    const c = vignetteCanvas.getContext("2d");
    const gradient = c.createRadialGradient(w / 2, h / 2, Math.min(w, h) * 0.18, w / 2, h / 2, Math.max(w, h) * 0.72);
    gradient.addColorStop(0, "rgba(0,0,0,0)");
    gradient.addColorStop(0.72, "rgba(0,0,0,0.16)");
    gradient.addColorStop(1, "rgba(0,0,0,0.58)");
    c.fillStyle = gradient;
    c.fillRect(0, 0, w, h);
  }

  function resize() {
    viewW = window.innerWidth;
    viewH = window.innerHeight;
    dpr = clamp(Math.min(1, 1400 / viewW, 800 / viewH), 0.35, 1);
    canvas.width = Math.floor(viewW * dpr);
    canvas.height = Math.floor(viewH * dpr);
    canvas.style.width = `${viewW}px`;
    canvas.style.height = `${viewH}px`;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    renderBackdropCache();
    renderVignetteCache();
  }

  function createBlankGrid() {
    return Array.from({ length: MAP_H }, () => Array(MAP_W).fill(WALL));
  }

  function splitNode(node, depth) {
    const minLeaf = 11;
    const maxDepth = 5;
    const canSplitV = node.w >= minLeaf * 2;
    const canSplitH = node.h >= minLeaf * 2;
    if ((!canSplitV && !canSplitH) || depth >= maxDepth) return;

    let splitH;
    if (!canSplitH) splitH = false;
    else if (!canSplitV) splitH = true;
    else if (node.w / node.h > 1.35) splitH = false;
    else if (node.h / node.w > 1.35) splitH = true;
    else splitH = rng.next() < 0.5;

    const lengthAxis = splitH ? node.h : node.w;
    if (lengthAxis - minLeaf <= minLeaf) return;
    if (depth > 2 && rng.next() < 0.14) return;

    const split = rng.int(minLeaf, lengthAxis - minLeaf);
    if (splitH) {
      node.a = { x: node.x, y: node.y, w: node.w, h: split };
      node.b = { x: node.x, y: node.y + split, w: node.w, h: node.h - split };
    } else {
      node.a = { x: node.x, y: node.y, w: split, h: node.h };
      node.b = { x: node.x + split, y: node.y, w: node.w - split, h: node.h };
    }
    splitNode(node.a, depth + 1);
    splitNode(node.b, depth + 1);
  }

  function carveRoom(room) {
    for (let y = room.y; y < room.y + room.h; y++) {
      for (let x = room.x; x < room.x + room.w; x++) {
        if (x > 0 && y > 0 && x < MAP_W - 1 && y < MAP_H - 1) grid[y][x] = FLOOR;
      }
    }
  }

  function createRooms(node) {
    if (node.a || node.b) {
      if (node.a) createRooms(node.a);
      if (node.b) createRooms(node.b);
      return;
    }
    const maxW = Math.max(6, node.w - 3);
    const maxH = Math.max(6, node.h - 3);
    const w = rng.int(5, maxW);
    const h = rng.int(5, maxH);
    const x = rng.int(node.x + 1, node.x + node.w - w - 1);
    const y = rng.int(node.y + 1, node.y + node.h - h - 1);
    const room = {
      id: rooms.length,
      x,
      y,
      w,
      h,
      cx: Math.floor(x + w / 2),
      cy: Math.floor(y + h / 2),
      multiplier: 1
    };
    node.room = room;
    rooms.push(room);
    carveRoom(room);
  }

  function nodeRoom(node) {
    if (node.room) return node.room;
    const choices = [];
    if (node.a) choices.push(nodeRoom(node.a));
    if (node.b) choices.push(nodeRoom(node.b));
    return rng.pick(choices.filter(Boolean));
  }

  function carveBrush(x, y, radius) {
    for (let oy = -radius; oy <= radius; oy++) {
      for (let ox = -radius; ox <= radius; ox++) {
        const tx = x + ox;
        const ty = y + oy;
        if (tx > 0 && ty > 0 && tx < MAP_W - 1 && ty < MAP_H - 1) grid[ty][tx] = FLOOR;
      }
    }
  }

  function carveCorridor(ax, ay, bx, by) {
    const radius = rng.next() < 0.16 ? 1 : 0;
    let x = ax;
    let y = ay;
    const horizontalFirst = rng.next() < 0.5;
    const carveX = () => {
      while (x !== bx) {
        carveBrush(x, y, radius);
        x += Math.sign(bx - x);
      }
    };
    const carveY = () => {
      while (y !== by) {
        carveBrush(x, y, radius);
        y += Math.sign(by - y);
      }
    };
    if (horizontalFirst) {
      carveX();
      carveY();
    } else {
      carveY();
      carveX();
    }
    carveBrush(bx, by, radius);
  }

  function connectTree(node) {
    if (!node.a || !node.b) return;
    const ra = nodeRoom(node.a);
    const rb = nodeRoom(node.b);
    carveCorridor(ra.cx, ra.cy, rb.cx, rb.cy);
    connectTree(node.a);
    connectTree(node.b);
  }

  function generateDungeon() {
    for (let attempt = 0; attempt < 60; attempt++) {
      grid = createBlankGrid();
      rooms = [];
      const root = { x: 2, y: 2, w: MAP_W - 4, h: MAP_H - 4 };
      splitNode(root, 0);
      createRooms(root);
      connectTree(root);
      if (rooms.length >= 8) {
        startRoom = rooms.reduce((best, room) => {
          const score = room.cx + room.cy;
          const bestScore = best.cx + best.cy;
          return score < bestScore ? room : best;
        }, rooms[0]);
        let far = startRoom;
        let farDist = 1;
        for (const room of rooms) {
          const d = distance(startRoom.cx, startRoom.cy, room.cx, room.cy);
          if (d > farDist) {
            far = room;
            farDist = d;
          }
        }
        for (const room of rooms) {
          const d = distance(startRoom.cx, startRoom.cy, room.cx, room.cy);
          room.multiplier = clamp(1 + Math.floor((d / farDist) * 4), 1, 5);
        }
        exitTile = { x: far.cx, y: far.cy, room: far };
        currentRoom = startRoom;
        lastRoom = startRoom;
        return;
      }
    }
  }

  function isWalkable(tx, ty) {
    return tx >= 0 && ty >= 0 && tx < MAP_W && ty < MAP_H && grid[ty][tx] === FLOOR;
  }

  function canStand(x, y, radius) {
    const points = [
      [x - radius, y - radius],
      [x + radius, y - radius],
      [x - radius, y + radius],
      [x + radius, y + radius],
      [x, y]
    ];
    for (const point of points) {
      if (!isWalkable(tileX(point[0]), tileY(point[1]))) return false;
    }
    return true;
  }

  function moveCircle(entity, dx, dy) {
    if (dx && canStand(entity.x + dx, entity.y, entity.r)) entity.x += dx;
    if (dy && canStand(entity.x, entity.y + dy, entity.r)) entity.y += dy;
  }

  function roomContains(room, tx, ty) {
    return tx >= room.x && ty >= room.y && tx < room.x + room.w && ty < room.y + room.h;
  }

  function randomTileInRoom(room) {
    for (let i = 0; i < 80; i++) {
      const x = rng.int(room.x + 1, room.x + room.w - 2);
      const y = rng.int(room.y + 1, room.y + room.h - 2);
      if (isWalkable(x, y)) return { x, y };
    }
    return { x: room.cx, y: room.cy };
  }

  function createEnemy(type, tile, room) {
    const data = ENEMY_DATA[type];
    const enemy = {
      id: enemyId++,
      type,
      x: tileCenterX(tile.x),
      y: tileCenterY(tile.y),
      r: type === "sentinel" ? 13 : 12,
      hp: data.hp,
      maxHp: data.hp,
      hpShown: data.hp,
      speed: data.speed,
      aggro: data.aggro * TILE,
      damage: data.damage,
      color: data.color,
      room,
      path: [],
      pathIndex: 0,
      targetTileX: -1,
      targetTileY: -1,
      repath: rng.float(0.05, 0.4),
      attackCd: rng.float(0.2, 0.9),
      senseTimer: rng.float(0, 0.12),
      seesPlayer: false,
      hitFlash: 0,
      state: type === "sentinel" ? "patrol" : "idle",
      alert: 0,
      faceX: 1,
      faceY: 0,
      patrolIndex: 0,
      waypoints: [],
      bobSeed: rng.float(0, 30)
    };
    if (type === "sentinel") {
      enemy.waypoints = sentinelWaypoints(room);
      const next = enemy.waypoints[0];
      enemy.faceX = Math.sign(next.x - enemy.x) || 1;
      enemy.faceY = Math.sign(next.y - enemy.y);
    }
    return enemy;
  }

  function sentinelWaypoints(room) {
    const tiles = [
      { x: room.x + 1, y: room.y + 1 },
      { x: room.x + room.w - 2, y: room.y + 1 },
      { x: room.x + room.w - 2, y: room.y + room.h - 2 },
      { x: room.x + 1, y: room.y + room.h - 2 }
    ].filter(tile => isWalkable(tile.x, tile.y));
    if (!tiles.length) tiles.push({ x: room.cx, y: room.cy });
    return tiles.map(tile => ({ x: tileCenterX(tile.x), y: tileCenterY(tile.y) }));
  }

  function placeActors() {
    enemies = [];
    items = [];
    projectiles = [];
    particles = [];
    enemyId = 1;
    const nonStart = rooms.filter(room => room !== startRoom);
    const required = ["grunt", "archer", "sentinel"];

    for (let i = 0; i < nonStart.length; i++) {
      const room = nonStart[i];
      const enemyCount = rng.int(1, Math.min(3, Math.max(1, room.multiplier)));
      for (let n = 0; n < enemyCount; n++) {
        const type = n === 0 && i < required.length ? required[i] : rng.pick(["grunt", "grunt", "archer", "sentinel"]);
        const tile = randomTileInRoom(room);
        if (distance(tile.x, tile.y, exitTile.x, exitTile.y) < 1.5) continue;
        enemies.push(createEnemy(type, tile, room));
      }
    }

    for (const room of rooms) {
      const chance = room === startRoom ? 0.82 : 0.58;
      if (rng.next() < chance) {
        const tile = randomTileInRoom(room);
        if (room === exitTile.room && distance(tile.x, tile.y, exitTile.x, exitTile.y) < 3) continue;
        items.push({
          type: rng.pick(["health", "speed", "damage"]),
          x: tileCenterX(tile.x),
          y: tileCenterY(tile.y),
          r: 10,
          pulseSeed: rng.float(0, 100),
          picked: false
        });
      }
    }
  }

  function resetGame() {
    rng = new RNG(makeSeed());
    generateDungeon();
    renderDungeonCache();
    explored = Array.from({ length: MAP_H }, () => Array(MAP_W).fill(false));
    minimapDirty = true;
    lastRevealX = -1;
    lastRevealY = -1;
    const spawnX = tileCenterX(startRoom.cx);
    const spawnY = tileCenterY(startRoom.cy);
    player = {
      x: spawnX,
      y: spawnY,
      r: 11,
      hp: 100,
      maxHp: 100,
      speed: 148,
      damage: 18,
      dir: "down",
      faceAngle: Math.PI / 2,
      attackCd: 0,
      attackTime: 0,
      attackAngle: Math.PI / 2,
      attackRange: 52,
      dodgeCd: 0,
      dodgeTime: 0,
      dodgeVX: 0,
      dodgeVY: 0,
      invuln: 0,
      footstep: 0,
      effects: {
        speed: 0,
        damage: 0,
        health: 0
      }
    };
    camera = { x: 0, y: 0 };
    keys = Object.create(null);
    mouse = { x: viewW / 2, y: viewH / 2, worldX: player.x, worldY: player.y, down: false };
    gameState = "playing";
    screenShake = 0;
    placeActors();
    revealAroundPlayer();
    renderMinimapCache();
    overlay.classList.remove("show");
    updateHud(true);
  }

  function renderDungeonCache() {
    dungeonCanvas = document.createElement("canvas");
    dungeonCanvas.width = MAP_W * TILE;
    dungeonCanvas.height = MAP_H * TILE;
    const c = dungeonCanvas.getContext("2d");
    c.fillStyle = "#030711";
    c.fillRect(0, 0, dungeonCanvas.width, dungeonCanvas.height);

    for (let y = 0; y < MAP_H; y++) {
      for (let x = 0; x < MAP_W; x++) {
        const px = x * TILE;
        const py = y * TILE;
        if (grid[y][x] === WALL) {
          c.fillStyle = "#030711";
          c.fillRect(px, py, TILE, TILE);
          if (neighborIsFloor(x, y)) {
            c.strokeStyle = "rgba(69,247,255,0.13)";
            c.strokeRect(px + 1.5, py + 1.5, TILE - 3, TILE - 3);
          }
        } else {
          c.fillStyle = "#071321";
          c.fillRect(px, py, TILE, TILE);
          c.fillStyle = "rgba(69,247,255,0.035)";
          c.fillRect(px + 1, py + 1, TILE - 2, TILE - 2);
          c.strokeStyle = "rgba(69,247,255,0.05)";
          c.strokeRect(px + 0.5, py + 0.5, TILE - 1, TILE - 1);
        }
      }
    }
  }

  function renderMinimapCache() {
    if (!minimapCanvas) {
      minimapCanvas = document.createElement("canvas");
      minimapCanvas.width = MAP_W * MINIMAP_TILE;
      minimapCanvas.height = MAP_H * MINIMAP_TILE;
    }
    const c = minimapCanvas.getContext("2d");
    c.clearRect(0, 0, minimapCanvas.width, minimapCanvas.height);
    for (let y = 0; y < MAP_H; y++) {
      for (let x = 0; x < MAP_W; x++) {
        if (!explored[y][x]) {
          c.fillStyle = "rgba(0,0,0,0.9)";
        } else if (grid[y][x] === WALL) {
          c.fillStyle = "rgba(42,72,95,0.5)";
        } else {
          c.fillStyle = "rgba(69,247,255,0.28)";
        }
        c.fillRect(x * MINIMAP_TILE, y * MINIMAP_TILE, MINIMAP_TILE, MINIMAP_TILE);
      }
    }
    minimapDirty = false;
  }

  function reconstructPath(came, startIndex, endIndex) {
    const path = [];
    let cur = endIndex;
    while (cur !== startIndex && cur !== -1) {
      const x = cur % MAP_W;
      const y = Math.floor(cur / MAP_W);
      path.push({ x, y });
      cur = came[cur];
    }
    path.reverse();
    return path;
  }

  function aStar(sx, sy, ex, ey) {
    sx = clamp(sx, 0, MAP_W - 1);
    sy = clamp(sy, 0, MAP_H - 1);
    ex = clamp(ex, 0, MAP_W - 1);
    ey = clamp(ey, 0, MAP_H - 1);
    if (!isWalkable(sx, sy) || !isWalkable(ex, ey)) return [];
    const startIndex = sy * MAP_W + sx;
    const endIndex = ey * MAP_W + ex;
    if (startIndex === endIndex) return [];
    const total = MAP_W * MAP_H;
    const g = new Float32Array(total);
    const came = new Int32Array(total);
    const closed = new Uint8Array(total);
    g.fill(Infinity);
    came.fill(-1);
    const heap = new MinHeap();
    g[startIndex] = 0;
    heap.push({ index: startIndex, f: Math.abs(ex - sx) + Math.abs(ey - sy) });

    while (heap.length) {
      const current = heap.pop();
      const index = current.index;
      if (closed[index]) continue;
      if (index === endIndex) return reconstructPath(came, startIndex, endIndex);
      closed[index] = 1;
      const cx = index % MAP_W;
      const cy = Math.floor(index / MAP_W);
      for (const [dx, dy] of DIRS) {
        const nx = cx + dx;
        const ny = cy + dy;
        if (!isWalkable(nx, ny)) continue;
        const ni = ny * MAP_W + nx;
        if (closed[ni]) continue;
        const nextG = g[index] + 1;
        if (nextG < g[ni]) {
          came[ni] = index;
          g[ni] = nextG;
          heap.push({ index: ni, f: nextG + Math.abs(ex - nx) + Math.abs(ey - ny) });
        }
      }
    }
    return [];
  }

  function setPathTo(enemy, tx, ty) {
    if (enemy.targetTileX === tx && enemy.targetTileY === ty && enemy.pathIndex < enemy.path.length) return;
    enemy.path = aStar(tileX(enemy.x), tileY(enemy.y), tx, ty);
    enemy.pathIndex = 0;
    enemy.targetTileX = tx;
    enemy.targetTileY = ty;
  }

  function followPath(enemy, dt, speedScale = 1) {
    if (!enemy.path || enemy.pathIndex >= enemy.path.length) return false;
    const tile = enemy.path[enemy.pathIndex];
    const tx = tileCenterX(tile.x);
    const ty = tileCenterY(tile.y);
    const dx = tx - enemy.x;
    const dy = ty - enemy.y;
    const d = length(dx, dy);
    if (d < 4) {
      enemy.pathIndex++;
      return true;
    }
    const step = enemy.speed * speedScale * dt;
    enemy.faceX = dx / d;
    enemy.faceY = dy / d;
    moveCircle(enemy, (dx / d) * step, (dy / d) * step);
    return true;
  }

  function hasLineOfSight(ax, ay, bx, by) {
    let x0 = tileX(ax);
    let y0 = tileY(ay);
    const x1 = tileX(bx);
    const y1 = tileY(by);
    const dx = Math.abs(x1 - x0);
    const dy = Math.abs(y1 - y0);
    const sx = x0 < x1 ? 1 : -1;
    const sy = y0 < y1 ? 1 : -1;
    let err = dx - dy;
    while (true) {
      if (!(x0 === tileX(ax) && y0 === tileY(ay)) && !isWalkable(x0, y0)) return false;
      if (x0 === x1 && y0 === y1) return true;
      const e2 = err * 2;
      if (e2 > -dy) {
        err -= dy;
        x0 += sx;
      }
      if (e2 < dx) {
        err += dx;
        y0 += sy;
      }
    }
  }

  function playerTile() {
    return { x: tileX(player.x), y: tileY(player.y) };
  }

  function updateCurrentRoom() {
    const pt = playerTile();
    for (const room of rooms) {
      if (roomContains(room, pt.x, pt.y)) {
        currentRoom = room;
        lastRoom = room;
        return;
      }
    }
    currentRoom = lastRoom || startRoom;
  }

  function currentMultiplier() {
    return (currentRoom || startRoom).multiplier;
  }

  function currentScore() {
    return enemies ? playerKills() * currentMultiplier() : 0;
  }

  function playerKills() {
    return player.kills || 0;
  }

  function revealAroundPlayer() {
    const cx = tileX(player.x);
    const cy = tileY(player.y);
    if (cx === lastRevealX && cy === lastRevealY) return;
    lastRevealX = cx;
    lastRevealY = cy;
    const radius = 7;
    let changed = false;
    for (let y = cy - radius; y <= cy + radius; y++) {
      for (let x = cx - radius; x <= cx + radius; x++) {
        if (x >= 0 && y >= 0 && x < MAP_W && y < MAP_H) {
          const dx = x - cx;
          const dy = y - cy;
          if (dx * dx + dy * dy <= radius * radius && !explored[y][x]) {
            explored[y][x] = true;
            changed = true;
          }
        }
      }
    }
    if (changed) minimapDirty = true;
  }

  function updatePlayer(dt) {
    player.attackCd = Math.max(0, player.attackCd - dt);
    player.attackTime = Math.max(0, player.attackTime - dt);
    player.dodgeCd = Math.max(0, player.dodgeCd - dt);
    player.invuln = Math.max(0, player.invuln - dt);
    player.effects.speed = Math.max(0, player.effects.speed - dt);
    player.effects.damage = Math.max(0, player.effects.damage - dt);
    player.effects.health = Math.max(0, player.effects.health - dt);

    const aimX = mouse.worldX - player.x;
    const aimY = mouse.worldY - player.y;
    if (length(aimX, aimY) > 6) {
      player.faceAngle = Math.atan2(aimY, aimX);
      setPlayerDirFromAngle(player.faceAngle);
    }

    if (player.dodgeTime > 0) {
      player.dodgeTime -= dt;
      moveCircle(player, player.dodgeVX * dt, player.dodgeVY * dt);
      spawnFootstep(0.018, "#45f7ff");
      return;
    }

    let mx = 0;
    let my = 0;
    if (keys.KeyW || keys.ArrowUp) my -= 1;
    if (keys.KeyS || keys.ArrowDown) my += 1;
    if (keys.KeyA || keys.ArrowLeft) mx -= 1;
    if (keys.KeyD || keys.ArrowRight) mx += 1;

    if (mx || my) {
      const d = length(mx, my);
      mx /= d;
      my /= d;
      const speed = player.speed * (player.effects.speed > 0 ? 1.55 : 1);
      moveCircle(player, mx * speed * dt, my * speed * dt);
      if (Math.abs(mx) > Math.abs(my)) player.dir = mx > 0 ? "right" : "left";
      else player.dir = my > 0 ? "down" : "up";
      player.faceAngle = Math.atan2(my, mx);
      player.footstep -= dt;
      if (player.footstep <= 0) {
        player.footstep = player.effects.speed > 0 ? 0.075 : 0.115;
        spawnFootstep(0.08, player.effects.speed > 0 ? "#45f7ff" : "#7cecff");
      }
    }
  }

  function setPlayerDirFromAngle(angle) {
    const c = Math.cos(angle);
    const s = Math.sin(angle);
    if (Math.abs(c) > Math.abs(s)) player.dir = c > 0 ? "right" : "left";
    else player.dir = s > 0 ? "down" : "up";
  }

  function startDodge() {
    if (gameState !== "playing" || player.dodgeCd > 0 || player.dodgeTime > 0) return;
    let dx = 0;
    let dy = 0;
    if (keys.KeyW || keys.ArrowUp) dy -= 1;
    if (keys.KeyS || keys.ArrowDown) dy += 1;
    if (keys.KeyA || keys.ArrowLeft) dx -= 1;
    if (keys.KeyD || keys.ArrowRight) dx += 1;
    if (!dx && !dy) {
      dx = Math.cos(player.faceAngle);
      dy = Math.sin(player.faceAngle);
    }
    const d = length(dx, dy) || 1;
    dx /= d;
    dy /= d;
    player.dodgeTime = 0.23;
    player.invuln = 0.38;
    player.dodgeCd = 0.78;
    player.dodgeVX = dx * 430;
    player.dodgeVY = dy * 430;
    player.faceAngle = Math.atan2(dy, dx);
    setPlayerDirFromAngle(player.faceAngle);
    addRing(player.x, player.y, "#45f7ff", 28);
  }

  function playerAttack() {
    if (gameState !== "playing" || player.attackCd > 0) return;
    const angle = Math.atan2(mouse.worldY - player.y, mouse.worldX - player.x);
    player.attackCd = 0.33;
    player.attackTime = 0.16;
    player.attackAngle = angle;
    player.faceAngle = angle;
    setPlayerDirFromAngle(angle);
    const damage = player.damage * (player.effects.damage > 0 ? 1.75 : 1);
    const range = player.attackRange;
    let hitAny = false;

    for (const enemy of enemies) {
      if (enemy.hp <= 0) continue;
      const dx = enemy.x - player.x;
      const dy = enemy.y - player.y;
      const d = length(dx, dy);
      if (d <= range + enemy.r) {
        const a = Math.atan2(dy, dx);
        if (Math.abs(angleDiff(a, angle)) <= 0.9) {
          damageEnemy(enemy, damage, angle);
          hitAny = true;
        }
      }
    }

    for (let i = 0; i < 10; i++) {
      const a = angle + rng.float(-0.75, 0.75);
      const distOut = rng.float(18, range);
      addParticle(player.x + Math.cos(a) * distOut, player.y + Math.sin(a) * distOut, {
        vx: Math.cos(a) * rng.float(80, 220),
        vy: Math.sin(a) * rng.float(80, 220),
        life: rng.float(0.16, 0.28),
        size: rng.float(2, 4),
        color: hitAny ? "#ffd34d" : "#45f7ff",
        drag: 0.84
      });
    }
  }

  function spawnFootstep(chance, color) {
    if (rng.next() > chance * 8) return;
    const side = rng.next() < 0.5 ? -1 : 1;
    const a = player.faceAngle + Math.PI / 2;
    addParticle(player.x + Math.cos(a) * side * 7, player.y + Math.sin(a) * side * 7, {
      vx: rng.float(-18, 18),
      vy: rng.float(-18, 18),
      life: rng.float(0.22, 0.36),
      size: rng.float(1.4, 2.6),
      color,
      drag: 0.78
    });
  }

  function damagePlayer(amount, sourceX, sourceY) {
    if (player.invuln > 0 || gameState !== "playing") return;
    player.hp = Math.max(0, player.hp - amount);
    player.invuln = 0.55;
    screenShake = Math.max(screenShake, 12);
    const angle = Math.atan2(player.y - sourceY, player.x - sourceX);
    for (let i = 0; i < 14; i++) {
      const a = angle + rng.float(-0.9, 0.9);
      addParticle(player.x, player.y, {
        vx: Math.cos(a) * rng.float(70, 230),
        vy: Math.sin(a) * rng.float(70, 230),
        life: rng.float(0.2, 0.48),
        size: rng.float(2, 4),
        color: "#ff4b6e",
        drag: 0.86
      });
    }
    addRing(player.x, player.y, "#ff4b6e", 34);
    if (player.hp <= 0) endGame("death");
  }

  function damageEnemy(enemy, amount, attackAngle) {
    enemy.hp = Math.max(0, enemy.hp - amount);
    enemy.hitFlash = 0.12;
    enemy.state = enemy.type === "sentinel" ? "chase" : enemy.state;
    enemy.alert = 1.5;
    const push = 14;
    moveCircle(enemy, Math.cos(attackAngle) * push, Math.sin(attackAngle) * push);
    for (let i = 0; i < 10; i++) {
      const a = attackAngle + rng.float(-1.1, 1.1);
      addParticle(enemy.x, enemy.y, {
        vx: Math.cos(a) * rng.float(60, 240),
        vy: Math.sin(a) * rng.float(60, 240),
        life: rng.float(0.18, 0.42),
        size: rng.float(2, 4),
        color: enemy.color,
        drag: 0.82
      });
    }
    if (enemy.hp <= 0) killEnemy(enemy);
  }

  function killEnemy(enemy) {
    player.kills = (player.kills || 0) + 1;
    enemy.dead = true;
    deathBurst(enemy.x, enemy.y, enemy.color);
    addRing(enemy.x, enemy.y, enemy.color, 46);
  }

  function updateEnemies(dt) {
    for (const enemy of enemies) {
      if (enemy.dead) continue;
      enemy.repath -= dt;
      enemy.attackCd -= dt;
      enemy.hitFlash = Math.max(0, enemy.hitFlash - dt);
      enemy.hpShown += (enemy.hp - enemy.hpShown) * clamp(dt * 12, 0, 1);
      if (enemy.type === "grunt") updateGrunt(enemy, dt);
      if (enemy.type === "archer") updateArcher(enemy, dt);
      if (enemy.type === "sentinel") updateSentinel(enemy, dt);
    }
    enemies = enemies.filter(enemy => !enemy.dead);
  }

  function updateGrunt(enemy, dt) {
    const d = distance(enemy.x, enemy.y, player.x, player.y);
    if (d < enemy.aggro || enemy.state === "chase") {
      enemy.state = "chase";
      if (enemy.repath <= 0) {
        const pt = playerTile();
        setPathTo(enemy, pt.x, pt.y);
        enemy.repath = 0.46 + rng.float(0, 0.18);
      }
      followPath(enemy, dt, 1);
    }
    if (d < enemy.r + player.r + 4 && enemy.attackCd <= 0) {
      enemy.attackCd = 0.68;
      damagePlayer(enemy.damage, enemy.x, enemy.y);
    }
  }

  function updateArcher(enemy, dt) {
    const d = distance(enemy.x, enemy.y, player.x, player.y);
    enemy.senseTimer -= dt;
    if (enemy.senseTimer <= 0) {
      enemy.seesPlayer = d < enemy.aggro && hasLineOfSight(enemy.x, enemy.y, player.x, player.y);
      enemy.senseTimer = 0.12;
    }
    const sees = enemy.seesPlayer;
    if (d < enemy.aggro) enemy.state = "engaged";

    if (enemy.state === "engaged") {
      if (d < TILE * 4.1) {
        if (enemy.repath <= 0) {
          const target = findRetreatTile(enemy);
          setPathTo(enemy, target.x, target.y);
          enemy.repath = 0.72;
        }
        followPath(enemy, dt, 1.25);
      } else if (d > TILE * 7.2) {
        if (enemy.repath <= 0) {
          const pt = playerTile();
          setPathTo(enemy, pt.x, pt.y);
          enemy.repath = 0.68;
        }
        followPath(enemy, dt, 0.82);
      } else {
        enemy.faceX = (player.x - enemy.x) / d;
        enemy.faceY = (player.y - enemy.y) / d;
      }
      if (sees && enemy.attackCd <= 0) {
        fireArrow(enemy);
        enemy.attackCd = 1.05 + rng.float(0, 0.32);
      }
    }
  }

  function findRetreatTile(enemy) {
    const ex = tileX(enemy.x);
    const ey = tileY(enemy.y);
    const px = tileX(player.x);
    const py = tileY(player.y);
    let best = { x: ex, y: ey, score: -Infinity };
    for (let y = ey - 7; y <= ey + 7; y++) {
      for (let x = ex - 7; x <= ex + 7; x++) {
        if (!isWalkable(x, y)) continue;
        const distPlayer = Math.hypot(x - px, y - py);
        const distEnemy = Math.hypot(x - ex, y - ey);
        if (distEnemy > 7 || distEnemy < 2) continue;
        const score = distPlayer * 2 - distEnemy + (roomContains(enemy.room, x, y) ? 2 : 0);
        if (score > best.score) best = { x, y, score };
      }
    }
    return best;
  }

  function fireArrow(enemy) {
    const dx = player.x - enemy.x;
    const dy = player.y - enemy.y;
    const d = length(dx, dy) || 1;
    const speed = 315;
    const startX = enemy.x + (dx / d) * 16;
    const startY = enemy.y + (dy / d) * 16;
    projectiles.push({
      x: startX,
      y: startY,
      vx: (dx / d) * speed,
      vy: (dy / d) * speed,
      r: 4,
      life: 2.2,
      color: "#45f7ff",
      damage: enemy.damage,
      trail: 0
    });
    addRing(startX, startY, "#45f7ff", 18);
  }

  function updateSentinel(enemy, dt) {
    enemy.senseTimer -= dt;
    if (enemy.senseTimer <= 0) {
      enemy.seesPlayer = sentinelSeesPlayer(enemy);
      enemy.senseTimer = 0.09;
    }
    if (enemy.seesPlayer) {
      enemy.state = "chase";
      enemy.alert = 1.7;
      enemy.repath = 0;
    }

    if (enemy.state === "chase") {
      enemy.alert -= dt;
      const d = distance(enemy.x, enemy.y, player.x, player.y);
      if (enemy.repath <= 0) {
        const pt = playerTile();
        setPathTo(enemy, pt.x, pt.y);
        enemy.repath = 0.42 + rng.float(0, 0.16);
      }
      followPath(enemy, dt, 1.18);
      if (d < enemy.r + player.r + 5 && enemy.attackCd <= 0) {
        enemy.attackCd = 0.82;
        damagePlayer(enemy.damage, enemy.x, enemy.y);
      }
      if (enemy.alert <= 0 && d > enemy.aggro * 1.3) {
        enemy.state = "patrol";
        enemy.path = [];
        enemy.pathIndex = 0;
      }
      return;
    }

    const target = enemy.waypoints[enemy.patrolIndex % enemy.waypoints.length];
    const dx = target.x - enemy.x;
    const dy = target.y - enemy.y;
    const d = length(dx, dy);
    if (d < 8) {
      enemy.patrolIndex = (enemy.patrolIndex + 1) % enemy.waypoints.length;
      return;
    }
    enemy.faceX = dx / d;
    enemy.faceY = dy / d;
    moveCircle(enemy, enemy.faceX * enemy.speed * 0.72 * dt, enemy.faceY * enemy.speed * 0.72 * dt);
  }

  function sentinelSeesPlayer(enemy) {
    const dx = player.x - enemy.x;
    const dy = player.y - enemy.y;
    const d = length(dx, dy);
    if (d <= 1 || d > enemy.aggro) return false;
    const dot = (dx / d) * enemy.faceX + (dy / d) * enemy.faceY;
    return dot >= Math.cos(SENTINEL_HALF_CONE) && hasLineOfSight(enemy.x, enemy.y, player.x, player.y);
  }

  function updateProjectiles(dt) {
    for (const projectile of projectiles) {
      projectile.life -= dt;
      projectile.x += projectile.vx * dt;
      projectile.y += projectile.vy * dt;
      projectile.trail -= dt;
      if (projectile.trail <= 0) {
        projectile.trail = 0.045;
        addParticle(projectile.x, projectile.y, {
          vx: -projectile.vx * 0.05 + rng.float(-20, 20),
          vy: -projectile.vy * 0.05 + rng.float(-20, 20),
          life: 0.22,
          size: rng.float(1.5, 3.3),
          color: projectile.color,
          drag: 0.88
        });
      }
      if (!isWalkable(tileX(projectile.x), tileY(projectile.y))) {
        projectile.life = 0;
        addRing(projectile.x, projectile.y, projectile.color, 18);
      }
      if (distance(projectile.x, projectile.y, player.x, player.y) < projectile.r + player.r && projectile.life > 0) {
        projectile.life = 0;
        damagePlayer(projectile.damage, projectile.x, projectile.y);
      }
    }
    projectiles = projectiles.filter(projectile => projectile.life > 0);
  }

  function updateItems(dt) {
    for (const item of items) {
      if (item.picked) continue;
      if (distance(item.x, item.y, player.x, player.y) < item.r + player.r + 4) {
        item.picked = true;
        applyItem(item.type);
        pickupBurst(item.x, item.y, ITEM_DATA[item.type].color);
      }
    }
    items = items.filter(item => !item.picked);
  }

  function applyItem(type) {
    if (type === "health") {
      player.hp = Math.min(player.maxHp, player.hp + 34);
      player.effects.health = 1.5;
    }
    if (type === "speed") player.effects.speed = 8.5;
    if (type === "damage") player.effects.damage = 9.5;
  }

  function addParticle(x, y, options) {
    if (particles.length > 280 && !options.ring) return;
    particles.push({
      x,
      y,
      vx: options.vx || 0,
      vy: options.vy || 0,
      life: options.life || 0.4,
      maxLife: options.life || 0.4,
      size: options.size || 3,
      color: options.color || "#fff",
      drag: options.drag || 0.9,
      gravity: options.gravity || 0,
      ring: options.ring || false,
      radius: options.radius || 0
    });
  }

  function addRing(x, y, color, radius) {
    addParticle(x, y, {
      life: 0.36,
      size: 2,
      color,
      ring: true,
      radius,
      drag: 1
    });
  }

  function pickupBurst(x, y, color) {
    addRing(x, y, color, 34);
    for (let i = 0; i < 18; i++) {
      const a = rng.float(0, Math.PI * 2);
      addParticle(x, y, {
        vx: Math.cos(a) * rng.float(55, 180),
        vy: Math.sin(a) * rng.float(55, 180),
        life: rng.float(0.28, 0.62),
        size: rng.float(2, 4.5),
        color,
        drag: 0.84
      });
    }
  }

  function deathBurst(x, y, color) {
    for (let i = 0; i < 34; i++) {
      const a = rng.float(0, Math.PI * 2);
      addParticle(x, y, {
        vx: Math.cos(a) * rng.float(70, 310),
        vy: Math.sin(a) * rng.float(70, 310),
        life: rng.float(0.34, 0.88),
        size: rng.float(2.2, 5.3),
        color: i % 4 === 0 ? "#ffffff" : color,
        drag: 0.82
      });
    }
  }

  function updateParticles(dt) {
    for (const p of particles) {
      p.life -= dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += p.gravity * dt;
      const drag = Math.pow(p.drag, dt * 60);
      p.vx *= drag;
      p.vy *= drag;
    }
    particles = particles.filter(p => p.life > 0);
  }

  function updateGame(dt) {
    if (gameState !== "playing") {
      updateParticles(dt);
      return;
    }
    updatePlayer(dt);
    updateCurrentRoom();
    revealAroundPlayer();
    updateItems(dt);
    updateEnemies(dt);
    updateProjectiles(dt);
    updateParticles(dt);
    screenShake = Math.max(0, screenShake - dt * 32);
    if (distance(player.x, player.y, tileCenterX(exitTile.x), tileCenterY(exitTile.y)) < 20) endGame("win");
    updateHud(false);
  }

  function endGame(kind) {
    if (gameState !== "playing") return;
    gameState = kind;
    const score = currentScore();
    overlayTitle.textContent = kind === "win" ? "Dungeon Cleared" : "Signal Lost";
    overlayMessage.textContent = `Final score: ${score}`;
    overlay.classList.add("show");
  }

  function updateHud(force) {
    const hp = Math.ceil(player.hp);
    const score = currentScore();
    const kills = playerKills();
    const mult = currentMultiplier();
    const active = [];
    if (player.effects.speed > 0) active.push(`<div class="itemBadge speed">SPD</div>`);
    if (player.effects.damage > 0) active.push(`<div class="itemBadge damage">DMG</div>`);
    if (player.effects.health > 0) active.push(`<div class="itemBadge health">HP</div>`);
    const iconHtml = active.join("");
    const signature = `${hp}|${score}|${kills}|${mult}|${Math.ceil(player.effects.speed)}|${Math.ceil(player.effects.damage)}|${Math.ceil(player.effects.health)}`;
    if (!force && signature === lastHud) return;
    hpFill.style.width = `${clamp((player.hp / player.maxHp) * 100, 0, 100)}%`;
    hpText.textContent = `${hp} / ${player.maxHp}`;
    scoreText.textContent = score;
    killsText.textContent = kills;
    multText.textContent = mult;
    activeItemsEl.innerHTML = iconHtml || `<div style="color:rgba(234,255,255,.48);font-size:12px;letter-spacing:.06em;text-transform:uppercase;padding:0 4px;">No active boosts</div>`;
    lastHud = signature;
  }

  function draw(time) {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, viewW, viewH);
    drawBackdrop(time);

    const worldW = MAP_W * TILE;
    const worldH = MAP_H * TILE;
    camera.x = clamp(player.x - viewW / 2, 0, Math.max(0, worldW - viewW));
    camera.y = clamp(player.y - viewH / 2, 0, Math.max(0, worldH - viewH));
    const shakeX = screenShake ? (Math.random() * 2 - 1) * screenShake : 0;
    const shakeY = screenShake ? (Math.random() * 2 - 1) * screenShake : 0;
    mouse.worldX = mouse.x + camera.x - shakeX;
    mouse.worldY = mouse.y + camera.y - shakeY;

    ctx.save();
    ctx.translate(-camera.x + shakeX, -camera.y + shakeY);
    drawDungeon(time);
    drawExit(time);
    drawItems(time);
    drawProjectiles(time);
    drawSentinelCones(time);
    drawEnemies(time);
    drawPlayer(time);
    drawParticles();
    ctx.restore();

    drawVignette();
    drawMinimap(time);
    drawFpsMeter();
  }

  function drawBackdrop(time) {
    if (backdropCanvas) ctx.drawImage(backdropCanvas, 0, 0, viewW, viewH);
    else {
      ctx.fillStyle = "#02050d";
      ctx.fillRect(0, 0, viewW, viewH);
    }
  }

  function drawDungeon(time) {
    if (!dungeonCanvas) return;
    const sx = clamp(Math.floor(camera.x) - TILE * 2, 0, Math.max(0, dungeonCanvas.width - 1));
    const sy = clamp(Math.floor(camera.y) - TILE * 2, 0, Math.max(0, dungeonCanvas.height - 1));
    const sw = clamp(Math.ceil(viewW) + TILE * 4, 1, dungeonCanvas.width - sx);
    const sh = clamp(Math.ceil(viewH) + TILE * 4, 1, dungeonCanvas.height - sy);
    ctx.drawImage(dungeonCanvas, sx, sy, sw, sh, sx, sy, sw, sh);
  }

  function neighborIsFloor(x, y) {
    return isWalkable(x + 1, y) || isWalkable(x - 1, y) || isWalkable(x, y + 1) || isWalkable(x, y - 1);
  }

  function drawExit(time) {
    const x = tileCenterX(exitTile.x);
    const y = tileCenterY(exitTile.y);
    const pulse = 0.5 + Math.sin(time * 4.2) * 0.5;
    ctx.save();
    ctx.fillStyle = `rgba(156,255,77,${0.09 + pulse * 0.09})`;
    ctx.beginPath();
    ctx.arc(x, y, 24 + pulse * 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = `rgba(156,255,77,${0.55 + pulse * 0.3})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.rect(x - 13, y - 13, 26, 26);
    ctx.stroke();
    ctx.translate(x, y);
    ctx.rotate(time * 1.2);
    ctx.strokeStyle = "rgba(69,247,255,0.82)";
    ctx.strokeRect(-9, -9, 18, 18);
    ctx.fillStyle = `rgba(156,255,77,${0.13 + pulse * 0.16})`;
    ctx.fillRect(-15, -15, 30, 30);
    ctx.restore();
  }

  function drawItems(time) {
    ctx.save();
    for (const item of items) {
      const data = ITEM_DATA[item.type];
      const pulse = 0.55 + Math.sin(time * 5 + item.pulseSeed) * 0.45;
      ctx.save();
    ctx.translate(item.x, item.y + Math.sin(time * 3 + item.pulseSeed) * 2);
      ctx.globalAlpha = 1;
      ctx.strokeStyle = data.color;
      ctx.fillStyle = data.color;
      ctx.lineWidth = 2;
      if (item.type === "health") {
        ctx.beginPath();
        ctx.moveTo(0, -11);
        ctx.bezierCurveTo(12, -21, 21, -4, 0, 13);
        ctx.bezierCurveTo(-21, -4, -12, -21, 0, -11);
        ctx.fill();
      } else if (item.type === "speed") {
        ctx.beginPath();
        ctx.moveTo(-12, -9);
        ctx.lineTo(2, 0);
        ctx.lineTo(-12, 9);
        ctx.moveTo(0, -9);
        ctx.lineTo(14, 0);
        ctx.lineTo(0, 9);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.moveTo(0, -14);
        ctx.lineTo(11, 7);
        ctx.lineTo(3, 7);
        ctx.lineTo(3, 14);
        ctx.lineTo(-8, -2);
        ctx.lineTo(0, -2);
        ctx.closePath();
        ctx.fill();
      }
      ctx.globalAlpha = 0.22 + pulse * 0.18;
      ctx.beginPath();
      ctx.arc(0, 0, 18 + pulse * 8, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  }

  function drawProjectiles() {
    ctx.save();
    for (const projectile of projectiles) {
      const angle = Math.atan2(projectile.vy, projectile.vx);
      ctx.save();
      ctx.translate(projectile.x, projectile.y);
      ctx.rotate(angle);
      ctx.strokeStyle = projectile.color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-10, 0);
      ctx.lineTo(8, 0);
      ctx.stroke();
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(8, 0, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }

  function drawSentinelCones() {
    ctx.save();
    for (const enemy of enemies) {
      if (enemy.type !== "sentinel" || enemy.state !== "patrol") continue;
      const angle = Math.atan2(enemy.faceY, enemy.faceX);
      ctx.fillStyle = "rgba(255,211,77,0.045)";
      ctx.strokeStyle = "rgba(255,211,77,0.12)";
      ctx.beginPath();
      ctx.moveTo(enemy.x, enemy.y);
      ctx.arc(enemy.x, enemy.y, enemy.aggro, angle - SENTINEL_HALF_CONE, angle + SENTINEL_HALF_CONE);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawEnemies(time) {
    for (const enemy of enemies) {
      drawEnemy(enemy, time);
      drawEnemyHp(enemy, time);
    }
  }

  function drawEnemy(enemy, time) {
    const pulse = 0.5 + Math.sin(time * 5 + enemy.bobSeed) * 0.5;
    ctx.save();
    ctx.translate(enemy.x, enemy.y + Math.sin(time * 6 + enemy.bobSeed) * 1.4);
    ctx.strokeStyle = enemy.hitFlash > 0 ? "#ffffff" : enemy.color;
    ctx.fillStyle = enemy.hitFlash > 0 ? "#ffffff" : enemy.color;
    ctx.lineWidth = 2;

    if (enemy.type === "grunt") {
      ctx.beginPath();
      ctx.moveTo(0, -15);
      ctx.lineTo(14, -3);
      ctx.lineTo(8, 15);
      ctx.lineTo(-8, 15);
      ctx.lineTo(-14, -3);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#240518";
      ctx.fillRect(-7, -4, 14, 5);
    }

    if (enemy.type === "archer") {
      ctx.beginPath();
      ctx.arc(0, 0, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(0, 0, 18, -1.1, 1.1);
      ctx.stroke();
      ctx.fillStyle = "#03121b";
      ctx.beginPath();
      ctx.arc(4, -2, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    if (enemy.type === "sentinel") {
      ctx.rotate(Math.atan2(enemy.faceY, enemy.faceX));
      ctx.beginPath();
      ctx.moveTo(16, 0);
      ctx.lineTo(-11, -13);
      ctx.lineTo(-7, 0);
      ctx.lineTo(-11, 13);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#120d02";
      ctx.beginPath();
      ctx.arc(4, 0, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = enemy.state === "chase" ? "#ff4b6e" : "#ffffff";
      ctx.beginPath();
      ctx.arc(6, 0, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawEnemyHp(enemy, time) {
    const w = 34;
    const h = 5;
    const x = enemy.x - w / 2;
    const y = enemy.y - enemy.r - 18 + Math.sin(time * 4 + enemy.id) * 1.2;
    const pct = clamp(enemy.hpShown / enemy.maxHp, 0, 1);
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,0.62)";
    ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
    ctx.fillStyle = enemy.color;
    ctx.fillRect(x, y, w * pct, h);
    ctx.strokeStyle = "rgba(255,255,255,0.4)";
    ctx.lineWidth = 1;
    ctx.strokeRect(x - 0.5, y - 0.5, w + 1, h + 1);
    ctx.restore();
  }

  function drawPlayer(time) {
    if (player.attackTime > 0) drawAttackArc();
    const blinking = player.invuln > 0 && Math.floor(time * 18) % 2 === 0;
    if (blinking && player.dodgeTime <= 0) return;
    const moving = keys.KeyW || keys.KeyA || keys.KeyS || keys.KeyD || keys.ArrowUp || keys.ArrowDown || keys.ArrowLeft || keys.ArrowRight || player.dodgeTime > 0;
    const bob = moving ? Math.sin(time * 13) * 1.6 : Math.sin(time * 3) * 0.7;
    ctx.save();
    ctx.translate(player.x, player.y + bob);
    ctx.lineWidth = 2;
    ctx.strokeStyle = "#eaffff";
    ctx.fillStyle = player.dodgeTime > 0 ? "#9cff4d" : "#45f7ff";

    const leg = Math.sin(time * 16) * (moving ? 4 : 1);
    if (player.dir === "down") {
      drawLegs(leg, 1);
      drawBody();
      ctx.fillStyle = "#06131f";
      ctx.fillRect(-7, 1, 14, 5);
      drawBlade(12, 7, 0.55);
    } else if (player.dir === "up") {
      drawLegs(leg, -1);
      drawBody();
      ctx.fillStyle = "#06131f";
      ctx.fillRect(-7, -7, 14, 5);
      drawBlade(-12, -7, -2.6);
    } else if (player.dir === "left") {
      drawSideLegs(leg);
      drawBody();
      ctx.fillStyle = "#06131f";
      ctx.fillRect(-9, -5, 5, 10);
      drawBlade(-13, 4, Math.PI);
    } else {
      drawSideLegs(leg);
      drawBody();
      ctx.fillStyle = "#06131f";
      ctx.fillRect(4, -5, 5, 10);
      drawBlade(13, 4, 0);
    }
    ctx.restore();
  }

  function drawBody() {
    ctx.beginPath();
    ctx.moveTo(0, -15);
    ctx.lineTo(12, -4);
    ctx.lineTo(9, 13);
    ctx.lineTo(0, 17);
    ctx.lineTo(-9, 13);
    ctx.lineTo(-12, -4);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = "rgba(255,255,255,0.88)";
    ctx.beginPath();
    ctx.arc(0, -3, 3.2, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawLegs(leg, dir) {
    ctx.strokeStyle = "#9cff4d";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-5, 8);
    ctx.lineTo(-7, 16 + leg * dir);
    ctx.moveTo(5, 8);
    ctx.lineTo(7, 16 - leg * dir);
    ctx.stroke();
  }

  function drawSideLegs(leg) {
    ctx.strokeStyle = "#9cff4d";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-4, 9);
    ctx.lineTo(-7 + leg, 16);
    ctx.moveTo(5, 9);
    ctx.lineTo(8 - leg, 16);
    ctx.stroke();
  }

  function drawBlade(x, y, angle) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.strokeStyle = "#ffd34d";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-8, 0);
    ctx.lineTo(9, 0);
    ctx.stroke();
    ctx.restore();
  }

  function drawAttackArc() {
    const t = player.attackTime / 0.16;
    ctx.save();
    ctx.strokeStyle = `rgba(255,211,77,${0.35 + t * 0.45})`;
    ctx.lineWidth = 8 * t + 2;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.attackRange * (1.08 - t * 0.18), player.attackAngle - 0.9, player.attackAngle + 0.9);
    ctx.stroke();
    ctx.restore();
  }

  function drawParticles() {
    ctx.save();
    for (const p of particles) {
      const alpha = clamp(p.life / p.maxLife, 0, 1);
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = p.color;
      ctx.fillStyle = p.color;
      if (p.ring) {
        const radius = p.radius * (1 - alpha * 0.25) + p.radius * (1 - alpha) * 0.9;
        ctx.lineWidth = 2 * alpha;
        ctx.beginPath();
        ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * (0.45 + alpha), 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawVignette() {
    if (vignetteCanvas) ctx.drawImage(vignetteCanvas, 0, 0, viewW, viewH);
  }

  function drawMinimap(time) {
    if (minimapDirty) renderMinimapCache();
    const maxW = Math.min(210, viewW * 0.26);
    const scale = maxW / minimapCanvas.width;
    const w = minimapCanvas.width * scale;
    const h = minimapCanvas.height * scale;
    const cell = MINIMAP_TILE * scale;
    const x0 = viewW - w - 16;
    const y0 = 16;
    ctx.save();
    ctx.fillStyle = "rgba(1,5,11,0.74)";
    ctx.strokeStyle = "rgba(69,247,255,0.3)";
    ctx.lineWidth = 1;
    ctx.fillRect(x0 - 8, y0 - 8, w + 16, h + 16);
    ctx.strokeRect(x0 - 8.5, y0 - 8.5, w + 17, h + 17);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(minimapCanvas, x0, y0, w, h);
    ctx.imageSmoothingEnabled = true;

    const exitExplored = explored[exitTile.y][exitTile.x];
    if (exitExplored) {
      ctx.fillStyle = `rgba(156,255,77,${0.65 + Math.sin(time * 5) * 0.25})`;
      ctx.fillRect(x0 + exitTile.x * cell - 2, y0 + exitTile.y * cell - 2, 5, 5);
    }
    for (const enemy of enemies) {
      const ex = tileX(enemy.x);
      const ey = tileY(enemy.y);
      if (!explored[ey] || !explored[ey][ex]) continue;
      ctx.fillStyle = enemy.color;
      ctx.fillRect(x0 + ex * cell - 1, y0 + ey * cell - 1, 3, 3);
    }
    const px = tileX(player.x);
    const py = tileY(player.y);
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(x0 + px * cell + cell * 0.5, y0 + py * cell + cell * 0.5, 3.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawFpsMeter() {
    const label = `FPS ${fpsValue}`;
    ctx.save();
    ctx.font = "12px system-ui, sans-serif";
    ctx.textAlign = "right";
    ctx.textBaseline = "top";
    const x = viewW - 16;
    const y = Math.min(viewH - 34, 16 + Math.min(210, viewW * 0.26) * (MAP_H / MAP_W) + 20);
    ctx.fillStyle = "rgba(1,5,11,0.72)";
    ctx.fillRect(x - 66, y - 4, 66, 22);
    ctx.strokeStyle = "rgba(69,247,255,0.28)";
    ctx.strokeRect(x - 66.5, y - 4.5, 67, 23);
    ctx.fillStyle = fpsValue >= 50 ? "#9cff4d" : fpsValue >= 35 ? "#ffd34d" : "#ff4b6e";
    ctx.fillText(label, x - 8, y);
    ctx.restore();
  }

  function updateMouseWorld() {
    mouse.worldX = mouse.x + camera.x;
    mouse.worldY = mouse.y + camera.y;
  }

  window.addEventListener("resize", () => {
    resize();
    updateMouseWorld();
  });

  window.addEventListener("keydown", event => {
    keys[event.code] = true;
    if (["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(event.code)) event.preventDefault();
    if (event.code === "Space") startDodge();
  }, { passive: false });

  window.addEventListener("keyup", event => {
    keys[event.code] = false;
  });

  function setMouseFromEvent(event) {
    const rect = canvas.getBoundingClientRect();
    mouse.x = event.clientX - rect.left;
    mouse.y = event.clientY - rect.top;
    updateMouseWorld();
  }

  canvas.addEventListener("mousemove", event => {
    setMouseFromEvent(event);
  });

  canvas.addEventListener("mousedown", event => {
    if (event.button === 0) {
      setMouseFromEvent(event);
      mouse.down = true;
      playerAttack();
    }
  });

  window.addEventListener("mouseup", () => {
    mouse.down = false;
  });

  regenButton.addEventListener("click", () => {
    resetGame();
  });

  function loop(now) {
    fpsFrames++;
    if (now - fpsTimer >= 500) {
      fpsValue = Math.round((fpsFrames * 1000) / (now - fpsTimer));
      fpsFrames = 0;
      fpsTimer = now;
    }
    const dt = Math.min(1 / 30, Math.max(0, (now - lastTime) / 1000));
    lastTime = now;
    updateGame(dt);
    draw(now / 1000);
    requestAnimationFrame(loop);
  }

  resize();
  resetGame();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
